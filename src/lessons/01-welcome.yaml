id: "welcome"
module: "Level 1 – Console Fundamentals"
order: 0
title: "Welcome to SPE"
difficulty: "intro"
description: |
  **Sitecore PowerShell Extensions** (SPE) gives you a command-line interface directly inside Sitecore. Think of it as having a PowerShell console that speaks Sitecore natively.

  In this tutorial, you'll work with a **simulated Sitecore content tree** — no real instance required. The commands you learn here work exactly the same in a real SPE console.

  The simulated tree looks like this:

  ```
  sitecore/
    content/
      Home/
        About/
          Contributors/   ← 25 items
            Michael West
            Adam Najmanowicz
            ...
          History
          Careers
        Products/
          XM Cloud/
          Content Hub
          ...
        News/
          SPE 7.0 Released
          ...
      Data/
    media library/
  ```

  > **Tip:** Switch to the **Tree** tab to browse the full content tree interactively.

  Let's start with the most fundamental command in SPE.
tasks:
  - instruction: |
      Use `Get-Item` to retrieve the Home item. The path format is: `master:\content\Home`
    hint: |
      Type: Get-Item -Path "master:\content\Home"
    validation:
      type: "structural"
      cmdlet: "get-item"
      requirePath:
        - "master:\\content\\home"
        - "master:\\content\\Home"
        - "master:/content/Home"
    successMessage: |
      You just retrieved your first Sitecore item. Notice the output shows the item Name, whether it has Children, the Language, Version number, its ID (a GUID in braces), and its TemplateName.
  - instruction: |
      Now try `Get-Help` — it lists all available commands. When you need to discover what a command does, this is your go-to tool.
    hint: |
      Type: Get-Help
    validation:
      type: "output"
      outputContains: "Available commands"
    successMessage: |
      `Get-Help` is your reference guide inside SPE. You can also run `Get-Help <command-name>` to see detailed help for a specific command, or add `-Examples` to see usage examples.
