id: "bulk-csv-import"
module: "Level 4 – Advanced Techniques"
order: 32
title: "Bulk Import from CSV"
difficulty: "advanced"
mode: "ise"
description: |
  Real-world SPE scripts often boil down to: read a spreadsheet, create or update one item per row. PowerShell makes this a one-liner with `Import-Csv | ForEach-Object { New-Item ... }`.

  ```powershell
  Import-Csv -Path "$SitecoreDataFolder\contributors.csv" | ForEach-Object {
      New-Item -Path "master:\content\Home\Contributors" `
               -Name $_.Name `
               -ItemType "Sample/Sample Item"
  }
  ```

  Each row becomes an object whose properties are the CSV's column headers. So `$_.Name`, `$_.Email`, `$_.Country` work just like field accessors. From there, every other pipeline cmdlet you've learned applies — `Where-Object` to filter rows, `Sort-Object` to order them, `Measure-Object` to count.

  > [!NOTE] Use `$SitecoreDataFolder` instead of hard-coded paths
  > SPE provides a small set of always-available variables that point to standard Sitecore folders: `$SitecoreDataFolder`, `$SitecoreLogFolder`, `$SitecoreTempFolder`, `$SitecorePackageFolder`, `$SitecoreSerializationFolder`. Scripts that use these survive moving instances or environments without edits.
  >
  > The simulator ships two example CSVs under `$SitecoreDataFolder`:
  > - `$SitecoreDataFolder\contributors.csv` (Name, Email, Country)
  > - `$SitecoreDataFolder\articles.csv` (Title, Author, Section, PublishDate)
  >
  > Open the **Variables** tab to see the resolved paths. PowerShell expands `$SitecoreDataFolder` inside double-quoted strings automatically.

  Common patterns:

  | Pattern | Code |
  | :--- | :--- |
  | Filter rows | `Import-Csv … \| Where-Object Country -eq "US"` |
  | Pick columns | `Import-Csv … \| Select-Object Name, Email` |
  | Iterate | `Import-Csv … \| ForEach-Object { $_.Name }` |
  | Bulk create | `Import-Csv … \| ForEach-Object { New-Item -Path … -Name $_.Title -ItemType … }` |
  | Bulk update | `Import-Csv … \| ForEach-Object { Set-ItemProperty -Path … -Name "Email" -Value $_.Email }` |

  > [!TIP] One pipeline, many rows
  > Because each row flows through the pipeline as a separate object, errors on one row don't stop the rest. Wrap risky parts in `try/catch` if you need transactional behavior.

tasks:
  - instruction: "Read the contributors CSV. Use `Import-Csv -Path \"data\\contributors.csv\"` to load every row."
    hint: 'Import-Csv -Path "$SitecoreDataFolder\contributors.csv"'
    nudge: "`Import-Csv -Path <file>` returns one object per CSV row, with the header as property names."
    starterCode: |
      # Read every row from the contributors CSV
    validation:
      type: "output"
      outputContains: "Alice"
    successMessage: "The CSV's header line becomes the property set; every other line is one row object. Notice how the columns Name / Email / Country render as actual columns."

  - instruction: "Filter to only US-based contributors. Pipe `Import-Csv` into `Where-Object { $_.Country -eq \"US\" }`."
    hint: |
      Import-Csv -Path "$SitecoreDataFolder\contributors.csv" | Where-Object { $_.Country -eq "US" }
    nudge: "`Where-Object { $_.Country -eq \"US\" }`. `$_.Country` reads the row's Country column — same access pattern that works on Sitecore items."
    starterCode: |
      # Filter contributors by country
    validation:
      type: "output"
      outputContains: "Dave"
    successMessage: "Where-Object treats CSV rows like any other pipeline object. The column name (Country) is just a property — same access pattern, no special syntax."

  - instruction: "Print each contributor's email. Use `ForEach-Object` and `Write-Host $_.Email`."
    hint: |
      Import-Csv -Path "$SitecoreDataFolder\contributors.csv" | ForEach-Object { Write-Host $_.Email }
    nudge: "Inside `ForEach-Object { }`, `$_` is the current row. Use `$_.Email` to read a column."
    starterCode: |
      # Print each contributor's email
    validation:
      type: "output"
      outputContains: "alice@example.com"
    successMessage: "Same pattern works for Sitecore items, search results, and CSV rows. The pipeline doesn't care about the source — only that each item has the property you ask for."

  - instruction: "Create a Sitecore item for every CSV row. Pipe `Import-Csv` into `ForEach-Object` and call `New-Item -Path \"master:\\content\\Home\" -Name $_.Name -ItemType \"Sample/Sample Item\"`."
    hint: |
      Import-Csv -Path "$SitecoreDataFolder\contributors.csv" | ForEach-Object {
          New-Item -Path "master:\content\Home" -Name $_.Name -ItemType "Sample/Sample Item"
      }
    nudge: "Wrap `New-Item -Path <parent> -Name $_.Name -ItemType <template>` in `ForEach-Object { }`. The Path stays the same; the Name varies per row."
    starterCode: |
      # Create one item per CSV row under master:\content\Home
    validation:
      type: "output"
      outputContains: "Alice"
    successMessage: "Four rows in the CSV → four new items under /content/Home. This four-line script is the workhorse of real-world content migrations."

  - instruction: "Verify the items were created. Run `Get-ChildItem -Path \"master:\\content\\Home\"` and confirm the new items appear."
    hint: 'Get-ChildItem -Path "master:\content\Home"'
    nudge: "`Get-ChildItem -Path <parent>` lists immediate children of the path. The new contributor items should appear alongside any pre-existing children."
    starterCode: |
      Import-Csv -Path "$SitecoreDataFolder\contributors.csv" | ForEach-Object {
          New-Item -Path "master:\content\Home" -Name $_.Name -ItemType "Sample/Sample Item"
      }

      # Verify the new items exist
    validation:
      type: "output"
      outputContains: "Carol"
    successMessage: "The created items show up immediately in the tree. In real SPE you'd publish them next, possibly with `Publish-Item -Recurse` after the bulk create."
